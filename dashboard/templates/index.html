<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETL Dashboard - Star Schema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container { max-width: 1200px; }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        .stat-card {
            background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
            color: white;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0.5rem 0;
        }
        .stat-label { font-size: 0.9rem; opacity: 0.9; }
        .btn-run {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            color: white;
            width: 100%;
        }
        .header-title {
            color: white;
            text-align: center;
            margin-bottom: 2rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .header-title h1 { font-size: 2.5rem; font-weight: 700; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-title">
            <h1>📊 ETL Dashboard</h1>
            <p>Star Schema Data Warehouse</p>
        </div>

        <div id="alertContainer"></div>

        <div class="row mb-4">
            <div class="col-md-3 mb-3">
                <div class="stat-card">
                    <div>📈</div>
                    <div class="stat-label">Total Rows</div>
                    <div class="stat-value" id="totalRows">-</div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="stat-card" style="background: linear-gradient(135deg, #10b981 0%, #34d399 100%);">
                    <div>📋</div>
                    <div class="stat-label">Columns</div>
                    <div class="stat-value" id="totalColumns">-</div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="stat-card" style="background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);">
                    <div>⚠️</div>
                    <div class="stat-label">Null Values</div>
                    <div class="stat-value" id="totalNulls">-</div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="stat-card" style="background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);">
                    <button class="btn-run" onclick="runETL()">
                        <span id="btnText">▶ Run ETL</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h5>📊 Source Distribution</h5>
                <canvas id="sourceChart"></canvas>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h5>📋 Data Preview</h5>
                <div style="max-height: 500px; overflow-y: auto;">
                    <table class="table table-hover">
                        <thead class="table-light" style="position: sticky; top: 0;">
                            <tr id="tableHeader"></tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Load Chart.js before our custom scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        let chart = null;
        
        function loadStats() {
            fetch('/api/stats')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('totalRows').textContent = data.total_rows || 0;
                    document.getElementById('totalColumns').textContent = data.total_columns || 0;
                    document.getElementById('totalNulls').textContent = Object.values(data.null_counts || {}).reduce((a,b) => a+b, 0);
                })
                .catch(err => console.error('Error loading stats:', err));
        }
        
        function loadChart() {
            fetch('/api/source_breakdown')
                .then(r => r.json())
                .then(data => {
                    const ctx = document.getElementById('sourceChart').getContext('2d');
                    if (chart) chart.destroy();
                    
                    const sources = Object.keys(data);
                    const counts = Object.values(data);
                    
                    if (sources.length === 0) {
                        sources.push('No Data');
                        counts.push(0);
                    }
                    
                    chart = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: sources,
                            datasets: [{
                                label: 'Rows per Source',
                                data: counts,
                                backgroundColor: 'rgba(99, 102, 241, 0.8)'
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true
                        }
                    });
                })
                .catch(err => console.error('Error loading chart:', err));
        }
        
        function loadTable() {
            fetch('/api/data?page=1&per_page=50')
                .then(r => r.json())
                .then(data => {
                    const header = document.getElementById('tableHeader');
                    const tbody = document.getElementById('tableBody');
                    header.innerHTML = '';
                    tbody.innerHTML = '';
                    
                    if (data && data.columns && data.data && data.data.length > 0) {
                        data.columns.forEach(col => {
                            const th = document.createElement('th');
                            th.textContent = col;
                            header.appendChild(th);
                        });
                        data.data.forEach(row => {
                            const tr = document.createElement('tr');
                            data.columns.forEach(col => {
                                const td = document.createElement('td');
                                td.textContent = row[col] || '-';
                                tr.appendChild(td);
                            });
                            tbody.appendChild(tr);
                        });
                    } else {
                        // Show empty state
                        const th = document.createElement('th');
                        th.textContent = 'No data available';
                        header.appendChild(th);
                    }
                })
                .catch(err => {
                    console.error('Error loading table:', err);
                    document.getElementById('tableHeader').innerHTML = '<th>Error loading data</th>';
                });
        }
        function runETL() {
            const btn = document.querySelector('.btn-run');
            const btnText = document.getElementById('btnText');
            btn.disabled = true;
            btnText.textContent = '⏳ Running...';
            
            fetch('/api/run_etl', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        alert('❌ Error: ' + data.error);
                    } else {
                        // Show detailed results
                        let message = '✅ ETL Complete!\n\n';
                        message += '📊 Rows Loaded: ' + (data.rows_loaded || 0) + '\n';
                        message += '⏱️  Time: ' + (data.elapsed_seconds || 0).toFixed(2) + 's\n';
                        
                        if (data.validation && !data.validation.passed) {
                            message += '\n⚠️  Validation: ' + data.validation.total_violations + ' violations';
                        } else {
                            message += '\n✅ Validation: Passed';
                        }
                        
                        alert(message);
                        
                        // Refresh all data
                        loadStats();
                        loadChart();
                        loadTable();
                    }
                })
                .catch(error => {
                    alert('❌ Error running ETL: ' + error.message);
                    console.error('ETL Error:', error);
                })
                .finally(() => {
                    btn.disabled = false;
                    btnText.textContent = '▶ Run ETL';
                });
        }
        document.addEventListener('DOMContentLoaded', function() {
            loadStats();
            loadChart();
            loadTable();
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
